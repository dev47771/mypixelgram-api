services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: mypixelgram-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    networks:
      - mypixelgram-network

  main:
    build:
      context: .
      dockerfile: apps/main/Dockerfile
      args:
        service: main
        port: 3000
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: staging
      PORT: 3000
      FILES_API_HOST: files
      FILES_API_PORT: 4250
      PAYMENT_API_HOST: payment
      PAYMENT_API_PORT: 4252
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      GITHUB_CALLBACK_URL: http://localhost:3000/api/v1/auth/github/callback
    depends_on:
      - rabbitmq
      - files
      - payment
    restart: unless-stopped
    networks:
      - mypixelgram-network

  files:
    build:
      context: .
      dockerfile: apps/files/Dockerfile
      args:
        service: files
        port: 4250
    ports:
      - "4250"
    environment:
      NODE_ENV: staging
      PORT_FILES_API: 4250
    restart: unless-stopped
    networks:
      - mypixelgram-network

  payment:
    build:
      context: .
      dockerfile: apps/payment/Dockerfile
      args:
        service: payment
        port: 3003
    ports:
      - "3003:3003"
      - "4252:4252"
    environment:
      NODE_ENV: staging
      PORT: 3003
      PAYMENT_TCP_PROD_PORT: 4252
      PAYMENT_API_MICROSERVICE_PORT: 4252
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - rabbitmq
    restart: unless-stopped
    networks:
      - mypixelgram-network

networks:
  mypixelgram-network:
    driver: bridge
